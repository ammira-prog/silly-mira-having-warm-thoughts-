<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter One</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: linear-gradient(180deg,#0B1026 0%,#111827 40%,#030712 100%);
    color:#F8FAFC;
    min-height:100vh;
    overflow-x:hidden;
    font-family:'Inter',sans-serif;
}

/* stars */
#stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
    0%,100%{opacity:.2;}
    50%{opacity:1;}
}

/* layout */
.container{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
}

.content{
    max-width:700px;
    text-align:center;
}

.title{
    font-family:'Cormorant Garamond',serif;
    font-size:3rem;
    color:#E9D5FF;
    margin-bottom:25px;
}

.line{
    opacity:0;
    font-size:1.15rem;
    line-height:1.9;
    margin:10px 0;
    transition:opacity 1.2s ease;
}

.show{
    opacity:1;
}

.countdown{
    font-family:'Cormorant Garamond',serif;
    font-size:2.6rem;
    color:#D8C8FF;
    margin-top:25px;
}

.chapter{
    font-family:'Cormorant Garamond',serif;
    font-size:4rem;
    color:#E9D5FF;
    text-shadow:0 0 10px rgba(233,213,255,.6);
    margin-top:20px;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgm" loop>
    <source src="piano.mp3" type="audio/mpeg">
</audio>

<div id="stars"></div>

<div class="container">
    <div class="content">
        <div class="title">Chapter One</div>
        <div id="story"></div>
    </div>
</div>

<script>

/* ---------------- STARS ---------------- */
const stars = document.getElementById('stars');

for(let i=0;i<120;i++){
    const star=document.createElement('div');
    star.className='star';
    star.style.left=Math.random()*100+'%';
    star.style.top=Math.random()*100+'%';
    star.style.animationDelay=Math.random()*4+'s';
    stars.appendChild(star);
}

/* ---------------- MUSIC ---------------- */
const bgm = document.getElementById("bgm");

function startMusic(){
    bgm.volume = 0.35;
    bgm.play().catch(()=>{});
}

document.body.addEventListener("click", startMusic, { once:true });

/* ---------------- STORY ---------------- */
const story = document.getElementById("story");

const lines = [
"I think of you.",
"The distance hurts sometimes.",
"But the thought of holding your hand one day keeps me going.",
"I want to care for you.",
"I want to love you.",
"So tonight, I'll stay under the same sky.",
"I appreciate what we have.",
"50 sunrises."
];

let i = 0;

function showLines(){

    if(i < lines.length){

        const d = document.createElement("div");
        d.className = "line show";
        d.textContent = lines[i];

        story.appendChild(d);
        i++;

        setTimeout(showLines, 1800);

    } else {
        startCountdown();
    }
}

/* ---------------- COUNTDOWN ---------------- */
function startCountdown(){

    let num = 50;

    const c = document.createElement("div");
    c.className = "countdown show";
    story.appendChild(c);

    const timer = setInterval(()=>{

        c.textContent = num + " sunrises";
        num--;

        if(num < 0){
            clearInterval(timer);
            c.remove();
            showFinal();
        }

    }, 1000);
}

/* ---------------- FINAL ---------------- */
function showFinal(){

    const end = [
        "And when the fifty sunrises are gone...",
        "",
        "Chapter One"
    ];

    let j = 0;

    function next(){

        if(j >= end.length) return;

        const d = document.createElement("div");

        if(end[j] === "Chapter One"){
            d.className = "chapter show";
        } else {
            d.className = "line show";
        }

        d.textContent = end[j];

        story.appendChild(d);

        j++;
        setTimeout(next, 2000);
    }

    next();
}

/* start */
setTimeout(showLines, 1000);

</script>

</body>
</html>
