<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter One</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: linear-gradient(180deg,#0B1026 0%,#111827 40%,#030712 100%);
    color:#F8FAFC;
    height:100vh;
    overflow:hidden;
    font-family:'Inter',sans-serif;
}

/* stars */
#stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
    0%,100%{opacity:.2;}
    50%{opacity:1;}
}

/* intro */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at center,#1a1f3a,#030712);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
    transition:opacity 1.2s ease;
}

.moon{
    font-size:6rem;
    cursor:pointer;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

.tap{
    margin-top:20px;
    color:#cbd5e1;
}

/* layout */
.container{
    position:relative;
    z-index:2;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.content{
    max-width:700px;
    text-align:center;
}

.title{
    font-family:'Cormorant+Garamond',serif;
    font-size:3rem;
    color:#E9D5FF;
    margin-bottom:25px;
}

.line{
    opacity:0;
    font-size:1.1rem;
    line-height:1.8;
    margin:8px 0;
    transition:opacity 1.2s ease;
}

.show{
    opacity:1;
}

.chapter{
    font-family:'Cormorant+Garamond',serif;
    font-size:3.5rem;
    color:#E9D5FF;
    text-shadow:0 0 10px rgba(233,213,255,.6);
    margin-top:15px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <div class="moon" id="moon">🌙</div>
    <div class="tap">Tap the moon</div>
</div>

<!-- MUSIC -->
<audio id="bgm" loop>
    <source src="piano.mp3" type="audio/mpeg">
</audio>

<div id="stars"></div>

<div class="container">
    <div class="content">
        <div class="title">Chapter One</div>
        <div id="story"></div>
    </div>
</div>

<script>

const stars = document.getElementById('stars');

for(let i=0;i<120;i++){
    const star=document.createElement('div');
    star.className='star';
    star.style.left=Math.random()*100+'%';
    star.style.top=Math.random()*100+'%';
    star.style.animationDelay=Math.random()*4+'s';
    stars.appendChild(star);
}

const story = document.getElementById("story");
const bgm = document.getElementById("bgm");

const lines = [
"I think of you.",
"The distance hurts sometimes.",
"But the thought of holding your hand one day keeps me going.",
"I want to care for you.",
"I want to love you.",
"But I don't want to get ahead of myself.",
"So tonight, I'll stay in my little corner, gazing at the night sky.",
"And as I look at it, it comforts me knowing we're beneath the same one.",
"I appreciate what we have.",
"Fifty more sunrises.",
"I'll try to hold everything together until then.",
"We'll see if we get to start",
"Chapter One."
];

let i = 0;

/* START */
document.getElementById("moon").addEventListener("click", () => {

    bgm.volume = 0.35;
    bgm.play().catch(()=>{});

    document.getElementById("intro").style.opacity = 0;

    setTimeout(()=>{
        document.getElementById("intro").style.display = "none";
        showLines();
    }, 1200);
});

/* STORY */
function showLines(){

    if(i < lines.length){

        const d = document.createElement("div");
        d.className = "line show";
        d.textContent = lines[i];

        story.appendChild(d);
        i++;

        setTimeout(showLines, 1800);

    } else {

        const final = document.createElement("div");
        final.className = "chapter show";
        final.textContent = "Chapter One";

        story.appendChild(final);

        bgm.pause();
        bgm.currentTime = 0;
    }
}

</script>

</body>
</html>
